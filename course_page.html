<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      color: #000;
    }

    h1 {
      font-size: 3rem;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .faculty {
      font-size: 1.3rem;
      color: #666;
      margin-bottom: 40px;
    }

    table {
      border-collapse: collapse;
      width: 60%;
    }

    th, td {
      border: 2px solid #000;
      padding: 20px 30px;
      text-align: center;
      font-size: 1.2rem;
    }

    th {
      font-weight: bold;
    }

    td a {
      color: #1a0dab;
      text-decoration: underline;
      font-size: 1.2rem;
    }

    td:first-child {
      text-align: center;
      width: 70%;
    }

    td:last-child {
      width: 30%;
    }
  </style>
</head>
<body>

  <h1>Course Page</h1>
  <p class="faculty">Faculty: Dr J Aruna Devi</p>

  <table>
    <thead>

        <th>Topic</th>

        <td><a href="#">SDLC MODELS</a></td>
